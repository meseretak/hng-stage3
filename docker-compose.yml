services:
  nextcloud:
    image: kefaslungu/hng-nextcloud:latest
    restart: unless-stopped
    environment:
      NEXTCLOUD_ADMIN_USER: ${NEXTCLOUD_ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${NEXTCLOUD_ADMIN_PASSWORD:-changeme}
      NEXTCLOUD_TRUSTED_DOMAINS: ${SERVER_IP:-localhost}
    volumes:
      - nextcloud_data:/var/www/html
      - HNG-nginx-logs:/var/log/nginx:ro
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - HNG-nginx-logs:/var/log/nginx
    depends_on:
      - nextcloud
    networks:
      - internal

  detector:
    build: ./detector
    restart: unless-stopped
    ports:
      - "8080:8080"
    cap_add:
      - NET_ADMIN
    volumes:
      - HNG-nginx-logs:/var/log/nginx:ro
      - detector_logs:/var/log/detector
    environment:
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
    depends_on:
      - nginx
    networks:
      - internal

volumes:
  nextcloud_data:
  HNG-nginx-logs:
    name: HNG-nginx-logs
  detector_logs:

networks:
  internal:
    driver: bridge
